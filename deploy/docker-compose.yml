# Noesis 生产栈：nginx + backend + qdrant + sandbox-runner
# 在仓库根目录执行: docker compose -f deploy/docker-compose.yml up -d
#
# 默认 docker exec + slim 镜像。构建 slim: docker build -t noesis/sandbox-slim:latest -f deploy/sandbox-slim/Dockerfile .
# 若仍用全量 AIO：SANDBOX_RUNTIME=aio + docker pull ghcr.io/agent-infra/sandbox:latest

name: ${COMPOSE_PROJECT_NAME:-noesis}

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-noesis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DATABASE:-noesis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/10-create-langgraph-db.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage

  sandbox-runner:
    build:
      context: ..
      dockerfile: deploy/sandbox-runner/Dockerfile
    restart: unless-stopped
    environment:
      SANDBOX_RUNNER_TOKEN: ${SANDBOX_RUNNER_TOKEN:-}
      SANDBOX_RUNTIME: ${SANDBOX_RUNTIME:-docker}
      SANDBOX_DOCKER_IMAGE: ${SANDBOX_DOCKER_IMAGE:-noesis/sandbox-slim:latest}
      SANDBOX_AIO_IMAGE: ${SANDBOX_AIO_IMAGE:-ghcr.io/agent-infra/sandbox:latest}
      SANDBOX_AIO_PORT: "8080"
      SANDBOX_PUBLIC_HOST: host.docker.internal
      NOESIS_HOST_DATA_DIR: /data/noesis
      SANDBOX_SKILLS_HOST_DIR: /data/skills
      SANDBOX_MAX_REPLICAS: "20"
      SANDBOX_IDLE_TTL_SECONDS: "259200"
      SANDBOX_REAP_INTERVAL_SECONDS: "3600"
      SANDBOX_HEADLESS: "1"
    volumes:
      - noesis_data:/data/noesis
      - ../extensions/skills:/data/skills:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default

  backend:
    build:
      context: ..
      dockerfile: deploy/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NOESIS_CONFIG_PATH: /app/config.yaml
      NOESIS_HOST_DATA_DIR: /data/noesis
      SANDBOX_RUNNER_URL: http://sandbox-runner:8090
      SANDBOX_RUNNER_TOKEN: ${SANDBOX_RUNNER_TOKEN:-}
      SANDBOX_SKIP_DOCKER_CHECK: "1"

    volumes:
      - ./config.docker.yaml:/app/config.yaml:ro
      - noesis_data:/data/noesis
      - backend_runtime:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      sandbox-runner:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8089/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  nginx:
    build:
      context: ..
      dockerfile: deploy/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "${NOESIS_HTTP_PORT:-28468}:80"
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:-noesis}_default

volumes:
  postgres_data:
  qdrant_storage:
  backend_runtime:
  noesis_data:
