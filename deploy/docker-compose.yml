# Noesis 生产栈：nginx + backend + qdrant + sandbox-runner
# 在仓库根目录执行: docker compose -f deploy/docker-compose.yml --env-file deploy/.env.docker up -d
#
# 关键：NOESIS_HOST_DATA_DIR / NOESIS_HOST_SKILLS_DIR 必须是 Docker **宿主机**绝对路径。
# runner 把这两个路径原样交给 daemon 做 bind；同时以相同路径挂进 runner，便于 mkdir。
# 示例（仓库根开发）:
#   NOESIS_HOST_DATA_DIR=/absolute/path/to/Noesis/.data
#   NOESIS_HOST_SKILLS_DIR=/absolute/path/to/Noesis/extensions/skills
#
# 构建 slim: docker build -t noesis/sandbox-slim:latest -f deploy/sandbox-slim/Dockerfile .

name: ${COMPOSE_PROJECT_NAME:-noesis}

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-noesis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DATABASE:-noesis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/10-create-langgraph-db.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage

  sandbox-runner:
    build:
      context: ..
      dockerfile: deploy/sandbox-runner/Dockerfile
    restart: unless-stopped
    environment:
      SANDBOX_RUNNER_TOKEN: ${SANDBOX_RUNNER_TOKEN:-}
      SANDBOX_RUNTIME: docker
      SANDBOX_DOCKER_IMAGE: ${SANDBOX_DOCKER_IMAGE:-noesis/sandbox-slim:latest}
      # 必须是宿主机绝对路径（daemon bind source）
      NOESIS_HOST_DATA_DIR: ${NOESIS_HOST_DATA_DIR:?Set NOESIS_HOST_DATA_DIR to absolute host path}
      SANDBOX_SKILLS_HOST_DIR: ${NOESIS_HOST_SKILLS_DIR:?Set NOESIS_HOST_SKILLS_DIR to absolute host skills path}
      SANDBOX_MAX_REPLICAS: "20"
      SANDBOX_IDLE_TTL_SECONDS: "259200"
      SANDBOX_REAP_INTERVAL_SECONDS: "3600"
      SANDBOX_UID: "10001"
      SANDBOX_GID: "10001"
      SANDBOX_MEM_LIMIT: "512m"
      SANDBOX_PIDS_LIMIT: "256"
    volumes:
      # 路径字符串与宿主机一致，避免「容器内路径冒充 host bind」
      - ${NOESIS_HOST_DATA_DIR}:${NOESIS_HOST_DATA_DIR}
      - ${NOESIS_HOST_SKILLS_DIR}:${NOESIS_HOST_SKILLS_DIR}:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default

  backend:
    build:
      context: ..
      dockerfile: deploy/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NOESIS_CONFIG_PATH: /app/config.yaml
      # 容器内用户数据根；与 runner 的 NOESIS_HOST_DATA_DIR 指向同一宿主机目录
      NOESIS_DATA_DIR: /data/noesis
      SANDBOX_RUNNER_URL: http://sandbox-runner:8090
      SANDBOX_RUNNER_TOKEN: ${SANDBOX_RUNNER_TOKEN:-}
      SANDBOX_SKIP_DOCKER_CHECK: "1"
    volumes:
      - ./config.docker.yaml:/app/config.yaml:ro
      - ${NOESIS_HOST_DATA_DIR}:/data/noesis
      - backend_runtime:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      sandbox-runner:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8089/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  nginx:
    build:
      context: ..
      dockerfile: deploy/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "${NOESIS_HTTP_PORT:-28468}:80"
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:-noesis}_default

volumes:
  postgres_data:
  qdrant_storage:
  backend_runtime:
