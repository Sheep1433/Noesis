# Noesis 生产栈：nginx + backend + qdrant
# 在仓库根目录执行: docker compose -f deploy/docker-compose.yml up -d

name: noesis

services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  backend:
    build:
      context: ..
      dockerfile: deploy/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      APP_ENV: prod
      NOESIS_CONFIG_PATH: /app/config.yaml
    volumes:
      - ./config.docker.yaml:/app/config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8089/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  nginx:
    build:
      context: ..
      dockerfile: deploy/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  qdrant_storage:
