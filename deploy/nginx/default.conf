server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 后端存活探测（与 backend/server.py 中 GET /health 一致）
    location = /health {
        proxy_pass http://backend:8089;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI 业务路由均以 /api 为前缀；含 chat SSE（text/event-stream）
    location /api/ {
        proxy_pass http://backend:8089;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 避免 SSE 被代理缓冲导致客户端长时间看不到增量
        proxy_buffering off;
        # 与 vite 开发代理长超时对齐，避免长对话被网关提前断开
        proxy_read_timeout 600s;
        send_timeout 600s;
    }

    # Vue Router history：非 /api 回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
