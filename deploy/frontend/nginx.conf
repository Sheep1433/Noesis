server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        text/xml
        application/xml
        image/svg+xml
        font/woff2;

    # 后端存活探测（与 backend/server.py 中 GET /health 一致）
    location = /health {
        proxy_pass http://backend:8089;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
    }

    # 认证类接口短超时，避免首屏 session 被 600s 拖死
    location ^~ /api/auth/ {
        proxy_pass http://backend:8089;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 8s;
        proxy_send_timeout 8s;
    }

    # FastAPI 业务路由均以 /api 为前缀；含 chat SSE（text/event-stream）
    location /api/ {
        proxy_pass http://backend:8089;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 避免 SSE 被代理缓冲导致客户端长时间看不到增量
        proxy_buffering off;
        # 与 vite 开发代理长超时对齐，避免长对话被网关提前断开
        proxy_read_timeout 600s;
        send_timeout 600s;
    }

    # 带 hash 的构建产物可长缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA 入口：禁止长缓存，避免发版后手机仍用旧 index 指到已删除的 JS
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files /index.html =404;
    }

    # Vue Router history：非 /api 回退到 index.html
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
