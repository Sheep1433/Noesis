# Docker Compose 运行时配置（无密钥；挂载到容器 /app/config.yaml）

config_version: 1

app:
  name: Noesis-FastAPI
  root_path: ""
  host: 0.0.0.0
  port: 8089
  version: 1.0.0
  reload: false

session:
  idle_expire_days: 30
  absolute_expire_days: 90
  renewal_window_minutes: 5
  cookie_name: noesis_session

database:
  host: postgres
  port: 5432
  user: noesis
  database: noesis
  echo: false
  max_overflow: 10
  pool_size: 50
  pool_recycle: 3600
  pool_timeout: 30

model:
  type: opencode
  name: deepseek-v4-flash-free
  temperature: 0.75
  base_url: https://opencode.ai/zen/v1
  show_thinking_process: true
  default_catalog_id: flash
  # OpenCode Zen 免费模型目录（models.dev cost.input=0；.env MODEL_API_KEY=public）
  catalog:
    - id: flash
      label: DeepSeek V4 Flash
      name: deepseek-v4-flash-free
    - id: big-pickle
      label: Big Pickle
      name: big-pickle
      temperature: 0.7
    - id: mimo
      label: MiMo V2.5
      name: mimo-v2.5-free
      temperature: 0.7
    - id: nemotron
      label: Nemotron 3 Ultra
      name: nemotron-3-ultra-free
      temperature: 0.6
    - id: north
      label: North Mini Code
      name: north-mini-code-free
      temperature: 0.5
  request_timeout: 120
  max_retries: 2
  generation:
    max_tokens: 32000
    top_p: 0.8
    frequency_penalty: 0.0
    presence_penalty: 0.0
    streaming: true

embedding:
  name: text-embedding-v4
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

rerank:
  name: gte-rerank-v2
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

vlm:
  name: Qwen3-VL-32B-Instruct
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

summarization:
  enabled: true
  model_name: ""
  temperature: 0.0
  trigger_tokens: 96000
  trigger_fraction: 0.75
  max_input_tokens: 0
  tool_offload_threshold: 6000
  max_retention_ratio: 0.65
  messages_to_keep: 28

loop_detection:
  enabled: true
  warn_threshold: 3
  hard_limit: 5
  window_size: 20
  max_tracked_threads: 100
  tool_freq_warn: 30
  tool_freq_hard_limit: 50

agent_runtime:
  dangling_tool_call_repair_enabled: true

stream:
  sse_keepalive_interval_seconds: 25

qdrant:
  host: qdrant
  port: 6333
  timeout: 5
  grpc_port: 6334
  prefer_grpc: false
  default_collection: knowledge_base
  requirement_docs_collection: requirement_docs
  test_case_docs_collection: test_case_docs
  test_case_upload_collection: ""
  case_rag_historical_requirements_enabled: false

langfuse:
  tracing_enabled: true
  base_url: http://host.docker.internal:8888

other:
  skills_filesystem_root: ""  # 空则默认 extensions/skills（Docker 镜像内为 /app/extensions/skills）

# 容器内路径基于 /app（backend/）；持久化见 docker-compose backend_runtime 卷
checkpoint:
  database: noesis_langgraph

chat_attachment:
  enabled: true
  ttl_days: 7
  max_file_mb: 20
  auto_convert: true
  max_image_mb: 5
  vision_enabled: true
  reinject_session_images: true
  max_files_per_message: 10
  tiny_inline_chars: 4096
  read_page_lines: 2000
  preview_chars: 500

# Web 检索工具（COMMON_QA / SUPER_AGENT_QA；TAVILY_API_KEY 见 deploy/.env.docker）
web_tools:
  max_search_results: 8
  fetch_max_chars: 4096
  fetch_timeout_seconds: 30
  ddg_backends: mojeek,yandex

# Agent 沙箱（深度研究 / 故障运维）
# backend: docker（推荐 slim 镜像 + docker exec）| aio（全量 AIO 镜像，需 uv sync --extra aio）| local_shell（宿主机）
# runner 镜像/回收等见 deploy/docker-compose.yml
sandbox:
  backend: docker
  runner_url: http://sandbox-runner:8090
  execute_timeout_seconds: 120

# 知识库 DeepDoc（权重挂载至 noesis_data:/data/noesis/rag/res/deepdoc）
kb:
  deepdoc:
    enabled: true
    model_dir: /data/noesis/rag/res/deepdoc
  parser:
    default: deepdoc
