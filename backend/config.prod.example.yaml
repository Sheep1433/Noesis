# 生产裸机运行时配置（复制为 config.prod.yaml）
# 密钥见 backend/.env.prod

config_version: 1

app:
  name: Noesis-FastAPI
  root_path: ""
  host: 0.0.0.0
  port: 8089
  version: 1.0.0
  reload: false

jwt:
  algorithm: HS256
  expire_minutes: 1440
  redis_expire_minutes: 30
  stop_token_expire_minutes: 15

database:
  host: 127.0.0.1
  port: 3306
  user: root
  database: noesis
  echo: false
  max_overflow: 10
  pool_size: 50
  pool_recycle: 3600
  pool_timeout: 30

model:
  type: openai
  name: deepseek-v4-flash
  temperature: 0.75
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  show_thinking_process: true
  # OpenCode Zen 免费模型示例（改 type/name/base_url；.env MODEL_API_KEY=public）：
  # type: opencode
  # name: deepseek-v4-flash-free
  # base_url: https://opencode.ai/zen/v1
  # default_catalog_id: flash
  # catalog:
  #   - id: flash
  #     label: DeepSeek V4 Flash（快速）
  #     name: deepseek-v4-flash-free
  #   - id: big-pickle
  #     label: Big Pickle（推理）
  #     name: big-pickle
  #   - id: mimo
  #     label: MiMo V2.5（小米）
  #     name: mimo-v2.5-free
  #   - id: nemotron
  #     label: Nemotron 3 Ultra（1M 上下文）
  #     name: nemotron-3-ultra-free
  #   - id: north
  #     label: North Mini Code（代码）
  #     name: north-mini-code-free
  request_timeout: 120
  max_retries: 2
  generation:
    max_tokens: 32000
    top_p: 0.8
    frequency_penalty: 0.0
    presence_penalty: 0.0
    streaming: true

embedding:
  name: text-embedding-v4
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

rerank:
  name: gte-rerank-v2
  # 精排走 DashScope text-rerank API；密钥默认复用 .env.prod 中 EMBEDDING_MODEL_API_KEY
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

vlm:
  name: Qwen3-VL-32B-Instruct
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

context:
  max_input_tokens: 128000
  display_enabled: true

summarization:
  enabled: true
  # 仅 model_name 单独配置；type / base_url / api_key 与 model 层一致
  model_name: ""
  temperature: 0.0
  # 触发压缩：trigger_tokens > 0 时用绝对 token 阈值；为 0 时用 trigger_fraction × context.max_input_tokens
  trigger_tokens: 96000
  trigger_fraction: 0.75
  max_input_tokens: 0
  # 仅卸載单条 ToolMessage 超过此阈值的正文（典型 web_search ~2.7k，保留在上下文中）
  tool_offload_threshold: 6000
  max_retention_ratio: 0.65
  messages_to_keep: 28

loop_detection:
  enabled: true
  warn_threshold: 3
  hard_limit: 5
  window_size: 20
  max_tracked_threads: 100
  tool_freq_warn: 30
  tool_freq_hard_limit: 50

agent_runtime:
  dangling_tool_call_repair_enabled: true
  tool_call_limit:
    enabled: true
    thread_limit: 200
    run_limit: null
    exit_behavior: continue
    task_run_limit: 10

stream:
  sse_keepalive_interval_seconds: 25

qdrant:
  host: 127.0.0.1
  port: 6333
  timeout: 5
  grpc_port: 6334
  prefer_grpc: false
  default_collection: knowledge_base
  requirement_docs_collection: requirement_docs
  test_case_docs_collection: test_case_docs
  test_case_upload_collection: ""
  case_rag_historical_requirements_enabled: false

langfuse:
  tracing_enabled: false
  base_url: http://127.0.0.1:3000

other:
  skills_filesystem_root: ""  # 空则默认 extensions/skills；可填绝对路径或相对仓库根的路径
  mcp_config_path: ""  # 空则默认 extensions/mcp/mcp.json；可用环境变量 MCP_CONFIG_PATH 覆盖

# LangGraph Agent checkpoint（SQLite 持久化）
checkpoint:
  db_path: ../.data/checkpoints/langgraph_checkpoints.sqlite

# Web 检索工具（COMMON_QA / DEEP_RESEARCH；TAVILY_API_KEY 见 .env.prod）
web_tools:
  max_search_results: 8
  fetch_max_chars: 4096
  fetch_timeout_seconds: 30

# Agent 沙箱（深度研究 / 故障运维）
# backend: aio（推荐）| local_shell（宿主机执行）；生产裸机须单独部署 sandbox-runner
sandbox:
  backend: aio
  runner_url: http://127.0.0.1:8090
  execute_timeout_seconds: 120

# 聊天会话附件（COMMON_QA；敏感项无）
chat_attachment:
  enabled: true
  ttl_days: 7
  max_file_mb: 20
  max_count_per_session: 10
  auto_convert: true
  max_image_mb: 5
  vision_enabled: true
  reinject_session_images: true
  max_images_per_message: 3
  tiny_inline_chars: 4096
  read_page_lines: 2000
  preview_chars: 500
