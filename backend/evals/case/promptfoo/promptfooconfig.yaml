# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
# prompts + providers + defaultTest.assert + tests（官方单文件结构）
description: Noesis 测试用例 Agent 离线评测（L0 + coverage + rag）
prompts:
- '{{scenario_description}}'
providers:
- id: file://provider.py
  label: test-case-agent
  config:
    pythonExecutable: ./run-python.sh
evaluateOptions:
  maxConcurrency: 1
defaultTest:
  options:
    provider: test-case-agent
  assert:
  - type: python
    value: file://../scoring.py:assert_l0
    metric: l0
  - type: llm-rubric
    value: file://coverage_rubric.txt
    metric: point_coverage_recall
    provider:
      id: file://judge_provider.py
      config:
        pythonExecutable: ./run-python.sh
  - type: python
    value: file://../scoring.py:assert_rag
    metric: rag_hit_at_3
tests:
- description: tc_login_001
  metadata:
    item_id: tc_login_001
  vars:
    item_id: tc_login_001
    scenario_description: 重点覆盖登录失败与验证码场景
    document_path: fixtures/documents/tc_login_001.md
    ground_truth:
      golden_test_points:
      - scene_name: 用户登录
        point_name: 用户名密码错误提示
      - scene_name: 用户登录
        point_name: 验证码过期刷新
    golden_test_points_json: "[\n  {\n    \"scene_name\": \"用户登录\",\n    \"point_name\"\
      : \"用户名密码错误提示\"\n  },\n  {\n    \"scene_name\": \"用户登录\",\n    \"point_name\"\
      : \"验证码过期刷新\"\n  }\n]\n"
