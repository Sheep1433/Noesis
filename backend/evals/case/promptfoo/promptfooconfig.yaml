      - scene_name: 扫码登录
        point_name: 企业微信扫码登录成功
      - scene_name: 账号绑定
        point_name: 首次绑定本地账号
    golden_test_points_json: "[\n  {\n    \"scene_name\": \"扫码登录\",\n    \"point_name\"\
      : \"企业微信扫码登录成功\"\n  },\n  {\n    \"scene_name\": \"账号绑定\",\n    \"point_name\"\
