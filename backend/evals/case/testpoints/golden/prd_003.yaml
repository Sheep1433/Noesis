# 金标准测试点：Judge 在评测时用 Agent 输出与本文件对比，计算 point_coverage_recall / point_coverage_precision。
# 本文件不包含 recall、precision 预置分数；二者为运行时指标，非标注数据。
item_id: prd_003
scenes:
- scene_name: 会话策略
  test_points:
  - point_name: 默认Access Token有效期2小时
  - point_name: 默认Refresh Token有效期7天
  - point_name: 记住我Refresh Token延长至30天
  - point_name: 记住我7天免登录对外文案
  - point_name: Cookie设置HttpOnly Secure SameSite
  - point_name: Access Token过期前5分钟静默刷新
- scene_name: 主动登出
  test_points:
  - point_name: 点击退出登录吊销当前Refresh Token
  - point_name: 登出后其它标签页下次请求401
  - point_name: 其它标签页401跳转登录页
  - point_name: 移动端同步清除本地Token
  - point_name: 登出接口幂等重复调用返回204
- scene_name: 被动失效
  test_points:
  - point_name: 管理员强制下线5分钟内全端失效
  - point_name: 密码修改吊销全部Refresh Token
- scene_name: 并发会话
  test_points:
  - point_name: 同一账号最多5个活跃Refresh Token
  - point_name: 第6次登录踢掉最早未活跃设备
  - point_name: 踢设备后邮件通知用户
- scene_name: 非功能
  test_points:
  - point_name: Token刷新接口P99小于200ms
  - point_name: Web控制台与H5共用账号体系
  - point_name: 不包含单点登录联邦能力
  - point_name: 不包含LDAP同步能力
