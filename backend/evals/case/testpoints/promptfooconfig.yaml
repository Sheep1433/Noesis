# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Noesis 测试用例 Agent 测试点 评测（L0 + point_coverage_recall + scene_name_recall）
prompts:
- '{{scenario_description}}'
providers:
- id: file://provider.py
  label: test-case-testpoints
  config:
    pythonExecutable: ../shared/run-python.sh
evaluateOptions:
  maxConcurrency: 1
defaultTest:
  options:
    provider: test-case-testpoints
  assert:
  - type: python
    value: file://../shared/assertions.py:assert_l0
    metric: l0
  - type: llm-rubric
    value: |
      你是测试设计评审员。根据 Agent 输出与金标准测试点，计算 **point_coverage_recall**（测试点覆盖召回率）。

      ## Agent 输出（JSON）
      {{output}}

      ## 金标准测试点
      {{golden_test_points_json}}

      ## 评分规则
      1. 从 Agent 输出的 JSON 中读取 `state.scenes_testpoints` 作为「生成测试点」；若为空或解析失败，score=0.0。
      2. 判断「生成测试点」是否**语义覆盖**每条金标准测试点（允许多个生成点共同覆盖一条；scene_name 可不完全一致）。
      3. **score** = 已覆盖金标准条数 / 金标准总条数，取值 0.0～1.0。
      4. **pass** 始终为 true（本指标仅汇报分数，不设通过阈值门禁）。
      5. 在 reason 中简要说明覆盖情况与 recall 计算依据。

      仅输出 JSON（不要其它文字）：
      ```json
      {
        "reason": "<覆盖分析>",
        "score": 0.0,
        "pass": true
      }
      ```
    metric: point_coverage_recall
    provider:
      id: file://../shared/judge.py
      config:
        pythonExecutable: ../shared/run-python.sh
  - type: python
    value: file://../shared/assertions.py:assert_scene_name_recall
    metric: scene_name_recall
tests:
- description: tc_login_001
  metadata:
    item_id: tc_login_001
  vars:
    item_id: tc_login_001
    scenario_description: 重点覆盖登录失败与验证码场景
    document_path: documents/tc_login_001.md
    ground_truth:
      golden_test_points:
      - scene_name: 用户登录
        point_name: 用户名密码错误提示
      - scene_name: 用户登录
        point_name: 验证码过期刷新
    golden_test_points_json: "[\n  {\n    \"scene_name\": \"用户登录\",\n    \"point_name\"\
      : \"用户名密码错误提示\"\n  },\n  {\n    \"scene_name\": \"用户登录\",\n    \"point_name\"\
      : \"验证码过期刷新\"\n  }\n]\n"
