# Noesis 运行时配置（非敏感项）
# 复制为 config.yaml 后按需修改；敏感项（API Key、密码等）放在 .env
#
# 自定义路径：export NOESIS_CONFIG_PATH=/path/to/config.yaml
# 支持 $ENV_VAR 引用，例如 base_url: $CUSTOM_BASE_URL

config_version: 1

app:
  name: Noesis-FastAPI
  root_path: ""
  host: 0.0.0.0
  port: 8089
  version: 1.0.0
  reload: true

jwt:
  algorithm: HS256
  expire_minutes: 1440
  redis_expire_minutes: 30
  stop_token_expire_minutes: 15

database:
  host: 127.0.0.1
  port: 3306
  user: root
  database: noesis
  echo: true
  max_overflow: 10
  pool_size: 50
  pool_recycle: 3600
  pool_timeout: 30

model:
  type: qwen
  name: qwen-plus
  temperature: 0.75
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  # OpenCode Zen 免费模型示例（.env 中 MODEL_API_KEY=public）：
  # type: opencode
  # name: deepseek-v4-flash-free
  # base_url: https://opencode.ai/zen/v1
  show_thinking_process: true
  # 单次 LLM HTTP 读超时（秒）：流式为相邻 chunk 间隔上限；深度研究建议 ≥120
  request_timeout: 120
  max_retries: 2
  generation:
    max_tokens: 32000
    top_p: 0.8
    frequency_penalty: 0.0
    presence_penalty: 0.0
    streaming: true

embedding:
  name: text-embedding-v4
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

rerank:
  name: gte-rerank-v2
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

vlm:
  name: Qwen3-VL-32B-Instruct
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

context:
  max_input_tokens: 128000
  display_enabled: true

summarization:
  enabled: true
  # 仅 model_name 单独配置；type / base_url / api_key 与 model 层一致
  model_name: ""
  temperature: 0.0
  trigger_tokens: 50000
  trigger_fraction: 0.85
  max_input_tokens: 0
  tool_offload_threshold: 1000
  max_retention_ratio: 0.6
  messages_to_keep: 20
  max_tokens_before_summary: 4000

loop_detection:
  enabled: true
  warn_threshold: 3
  hard_limit: 5
  window_size: 20
  max_tracked_threads: 100
  tool_freq_warn: 30
  tool_freq_hard_limit: 50

agent_runtime:
  dangling_tool_call_repair_enabled: true
  tool_call_limit:
    enabled: true
    thread_limit: 200
    run_limit: null
    exit_behavior: continue
    task_run_limit: 10

stream:
  sse_keepalive_interval_seconds: 25

qdrant:
  host: 127.0.0.1
  port: 6333
  timeout: 5
  grpc_port: 6334
  prefer_grpc: false
  default_collection: knowledge_base
  requirement_docs_collection: requirement_docs
  test_case_docs_collection: test_case_docs
  test_case_upload_collection: ""
  case_rag_historical_requirements_enabled: false

langfuse:
  tracing_enabled: false
  base_url: http://127.0.0.1:3000

other:
  skills_filesystem_root: ""  # 空则默认 extensions/skills；可填绝对路径或相对仓库根的路径
  mcp_config_path: ""  # 空则默认 extensions/mcp/mcp.json；可用环境变量 MCP_CONFIG_PATH 覆盖

# LangGraph Agent checkpoint（SQLite 持久化）
checkpoint:
  db_path: ../.data/checkpoints/langgraph_checkpoints.sqlite

# Web 检索工具（COMMON_QA / DEEP_RESEARCH；TAVILY_API_KEY 见 .env）
web_tools:
  max_search_results: 8
  fetch_max_chars: 4096
  fetch_timeout_seconds: 30

# Agent 沙箱（深度研究 / 故障运维）
# backend: aio（推荐，./scripts/run.sh dev 会自动启动 sandbox-runner）| local_shell（宿主机执行）
sandbox:
  backend: aio
  runner_url: http://127.0.0.1:8090
  execute_timeout_seconds: 120

# 聊天会话附件（COMMON_QA；敏感项无）
chat_attachment:
  enabled: true
  dir: ../.data/chat_attachments
  ttl_days: 7
  max_file_mb: 20
  max_count_per_session: 10
  auto_convert: true
  max_image_mb: 5
  vision_enabled: true
  reinject_session_images: true
  max_images_per_message: 3
  tiny_inline_chars: 4096
  read_page_lines: 2000
  preview_chars: 500
