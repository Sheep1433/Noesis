# Noesis 运行时配置（非敏感项）
# 复制为 config.yaml 后按需修改；敏感项（API Key、密码等）放在 .env
#
# 自定义路径：export NOESIS_CONFIG_PATH=/path/to/config.yaml
# 支持 $ENV_VAR 引用，例如 base_url: $CUSTOM_BASE_URL

config_version: 1

app:
  name: Noesis-FastAPI
  root_path: ""
  host: 0.0.0.0
  port: 8089
  version: 1.0.0
  reload: true

session:
  # 生产环境必须通过同源 HTTPS 部署，Cookie 由服务端管理。
  idle_expire_days: 30
  absolute_expire_days: 90
  renewal_window_minutes: 5
  cookie_name: noesis_session

database:
  host: 127.0.0.1
  port: 5432
  user: noesis
  database: noesis
  echo: true
  max_overflow: 10
  pool_size: 50
  pool_recycle: 3600
  pool_timeout: 30

model:
  type: qwen
  name: qwen-plus
  temperature: 0.75
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  show_thinking_process: true
  # 运行时可选模型目录；前端会话级切换 model_id，未配置时仅使用上方默认 model
  default_catalog_id: default
  catalog:
    - id: default
      label: Qwen Plus（默认）
      name: qwen-plus
      limit:
        context: 129024
        output: 8192
    - id: qwen-vl-max
      label: Qwen VL Max（识图）
      name: qwen-vl-max
    - id: qwen-max
      label: Qwen Max（更强）
      name: qwen-max
      temperature: 0.7
      limit:
        context: 30720
        output: 8192
  # --- OpenCode Zen 免费模型示例（取消注释并改 default_catalog_id；.env MODEL_API_KEY=public）---
  # type: opencode
  # name: deepseek-v4-flash-free
  # base_url: https://opencode.ai/zen/v1
  # default_catalog_id: flash
  # catalog:
  #   - id: flash
  #     label: DeepSeek V4 Flash（快速）
  #     name: deepseek-v4-flash-free
  #     limit:
  #       context: 200000
  #       output: 128000
  #   - id: nemotron
  #     label: Nemotron 3 Ultra（1M 上下文）
  #     name: nemotron-3-ultra-free
  #     limit:
  #       context: 1000000
  #       output: 128000
  # 单次 LLM HTTP 读超时（秒）：流式为相邻 chunk 间隔上限；深度研究建议 ≥120
  request_timeout: 120
  max_retries: 2
  generation:
    max_tokens: 32000
    top_p: 0.8
    frequency_penalty: 0.0
    presence_penalty: 0.0
    streaming: true

embedding:
  name: text-embedding-v4
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

rerank:
  name: gte-rerank-v2
  # 精排走 DashScope text-rerank API；密钥默认复用 .env 中 EMBEDDING_MODEL_API_KEY
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

vlm:
  name: qwen-vl-max
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

context:
  max_input_tokens: 0
  display_enabled: true

summarization:
  enabled: true
  # 仅 model_name 单独配置；type / base_url / api_key 与 model 层一致
  model_name: ""
  temperature: 0.0
  # 触发压缩：trigger_tokens > 0 时用绝对 token 阈值；为 0 时用 trigger_fraction × catalog limit.context
  trigger_tokens: 0
  trigger_fraction: 0.75
  max_input_tokens: 0
  # 仅卸載单条 ToolMessage 超过此阈值的正文（典型 web_search ~2.7k，保留在上下文中）
  tool_offload_threshold: 6000
  max_retention_ratio: 0.65
  messages_to_keep: 28

loop_detection:
  enabled: true
  warn_threshold: 3
  hard_limit: 5
  window_size: 20
  max_tracked_threads: 100
  tool_freq_warn: 30
  tool_freq_hard_limit: 50

agent_runtime:
  dangling_tool_call_repair_enabled: true
  tool_call_limit:
    enabled: true
    thread_limit: 200
    run_limit: null
    exit_behavior: continue
    task_run_limit: 10

stream:
  sse_keepalive_interval_seconds: 25

messaging:
  # Telegram long-poll 真收发；默认关，开前先在设置页填 bot token + 配对 chat_id
  telegram_runtime_enabled: false
  telegram_poll_timeout_seconds: 25

qdrant:
  host: 127.0.0.1
  port: 6333
  timeout: 5
  grpc_port: 6334
  prefer_grpc: false
  default_collection: knowledge_base
  requirement_docs_collection: requirement_docs
  test_case_docs_collection: test_case_docs
  test_case_upload_collection: ""
  case_rag_historical_requirements_enabled: false

langfuse:
  tracing_enabled: false
  base_url: http://127.0.0.1:3000

other:
  skills_filesystem_root: ""  # 空则默认 extensions/skills；可填绝对路径或相对仓库根的路径
  mcp_config_path: ""  # 空则默认 extensions/mcp/mcp.json

# Skills 市场（skills.sh 搜索 + GitHub 安装到个人 skills）
skills_market:
  provider: skills_sh
  base_url: https://skills.sh
  search_timeout_seconds: 15
  github_timeout_seconds: 60
  cache_ttl_seconds: 3600
  preview_cache_ttl_seconds: 86400  # SKILL.md 详情缓存（秒），默认 24h
  max_archive_bytes: 52428800  # 50MB
  # featured_skills 可省略，使用内置推荐种子

# LangGraph Agent checkpoint（独立 PostgreSQL 数据库）
checkpoint:
  database: noesis_langgraph

# Web 检索工具（COMMON_QA / SUPER_AGENT_QA；TAVILY_API_KEY 见 .env）
web_tools:
  max_search_results: 8
  fetch_max_chars: 4096
  fetch_timeout_seconds: 30
  # DDG 回退引擎（逗号分隔）。本机实测可用：mojeek（中文/技术 query）；brave 仅英文较稳。勿用 yandex（常 0 条）或 auto（易超时）
  ddg_backends: mojeek

# Agent 沙箱（深度研究 / 故障运维）
# backend: docker（推荐 slim 镜像 + docker exec）| local_shell（宿主机）
sandbox:
  backend: docker
  runner_url: http://127.0.0.1:8090
  execute_timeout_seconds: 120

# SuperAgent HITL（工具审批 / ask_user）；默认关闭，与现网行为一致
# ask_timeout_seconds: 超时未审批按 reject；86400 = 24h
hitl:
  enabled: false
  ask_timeout_seconds: 86400

# 知识库 DeepDoc（ONNX 权重需单独下载，见 backend/kb/README.md）
kb:
  deepdoc:
    enabled: true
    model_dir: ../.data/rag/res/deepdoc
  parser:
    default: deepdoc

# 聊天会话附件（COMMON_QA；敏感项无）
chat_attachment:
  enabled: true
  # 磁盘路径固定为 .data/users/{user_id}/sessions/{session_id}/uploads|attachments/（见 user_data_paths）
  ttl_days: 7
  max_file_mb: 20
  auto_convert: true
  max_image_mb: 5
  vision_enabled: true
  reinject_session_images: true
  max_files_per_message: 10
  image_inject_max_edge: 1536
  vlm_fallback_enabled: true
  tiny_inline_chars: 4096
  read_page_lines: 2000
  preview_chars: 500
