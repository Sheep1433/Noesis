# dev 分支 CI 通过后，SSH 到开发栈目录执行 scripts/deploy-remote.sh（DEPLOY_BRANCH=dev）。
#
# 与 production 可共用同一台机器（同 IP / SSH 用户），通过不同目录与 HTTP 端口区分：
#   production  DEPLOY_PATH=/root/zzq/code/noesis      → :28468，MySQL 库 noesis
#   development DEPLOY_PATH=/root/zzq/code/noesis-dev → :28469，MySQL 库 noesis_dev
#
# 请在 GitHub Settings → Environments → development 中至少配置：
#   DEPLOY_PATH        开发栈仓库绝对路径（与 production 不同）
# 其余 Secrets（DEPLOY_HOST / DEPLOY_USER / SSH_PRIVATE_KEY）可沿用仓库级配置。

name: Deploy Dev

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: deploy-development
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

defaults:
  run:
    shell: bash

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'dev'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: development

    steps:
      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          missing=()
          [[ -n "${DEPLOY_HOST}" ]] || missing+=("DEPLOY_HOST")
          [[ -n "${DEPLOY_USER}" ]] || missing+=("DEPLOY_USER")
          [[ -n "${SSH_PRIVATE_KEY}" ]] || missing+=("SSH_PRIVATE_KEY")
          [[ -n "${DEPLOY_PATH}" ]] || missing+=("DEPLOY_PATH")
          if ((${#missing[@]} > 0)); then
            echo "缺少 GitHub Secrets（development 环境）: ${missing[*]}" >&2
            exit 1
          fi

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${DEPLOY_SSH_PORT:-22}"
          ssh-keyscan -p "${PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to dev server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          PORT="${DEPLOY_SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key \
            -p "${PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' && DEPLOY_BRANCH=dev bash ./scripts/deploy-remote.sh"

      - name: Remove SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
