name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  # CI 默认关闭 Langfuse，避免外呼与用例对冻结配置的 patch 冲突
  LANGFUSE_TRACING_ENABLED: "false"
  APP_ENV: dev
  JWT_SECRET_KEY: ci-jwt-secret
  MYSQL_PASSWORD: ci-mysql-password
  MODEL_API_KEY: sk-ci-placeholder
  EMBEDDING_MODEL_API_KEY: sk-ci-placeholder
  DASHSCOPE_API_KEY: sk-ci-placeholder

jobs:
  backend:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        run: uv sync --frozen

      - name: Prepare runtime config
        run: cp config.example.yaml config.yaml

      - name: Import smoke check
        run: uv run python -c "from server import app; assert app.title"

      - name: Run backend tests
        run: uv run pytest tests/ -q

  frontend:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
